<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Booking | Language Learning Center</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
</head>
<body>
    <header role="banner">
        <div class="container">
            <h1><a href="index.html">🌍 LangLearn Center</a></h1>
            <nav role="navigation" aria-label="Main Navigation">
                <a href="index.html">Home</a>
                <a href="gallery.html">Gallery</a>
                <a href="booking.html" class="active">Booking</a>
                <a href="help.html">Help</a>
                <a href="about.html">About</a>
            </nav>
        </div>
    </header>

    <main role="main">
        <div class="container">
            <h2 style="text-align:center; color:#1a237e; margin-bottom:30px; font-size:2rem;">
                📝 Guest Booking Form
            </h2>
            <div class="form-container">
                <form action="#" method="POST" novalidate>
                    <!-- Personal Info -->
                    <fieldset>
                        <legend>👤 Personal Information</legend>
                        <div class="form-group">
                            <label for="fullname">Full Name *</label>
                            <input type="text" id="fullname" name="fullname" 
                                   placeholder="e.g. Ahmed Hassan" required>
                        </div>
                        <div class="form-group">
                            <label for="major">Major / Program</label>
                            <select id="major" name="major" required>
                                <option value="">-- Select your major --</option>
                                <option value="cs">Computer Science</option>
                                <option value="it">Information Technology</option>
                                <option value="engineering">Engineering</option>
                                <option value="business">Business</option>
                                <option value="medicine">Medicine</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Gender *</label>
                            <div class="radio-group">
                                <label><input type="radio" name="gender" value="male" required> 👨 Male</label>
                                <label><input type="radio" name="gender" value="female" required> 👩 Female</label>
                                <label><input type="radio" name="gender" value="other" required> Other</label>
                            </div>
                        </div>
                    </fieldset>

                    <!-- Interests & Comments -->
                    <fieldset>
                        <legend>🎯 Interests & Feedback</legend>
                        <div class="form-group">
                            <label>Hobbies</label>
                            <div class="checkbox-group">
                                <label><input type="checkbox" name="hobbies" value="reading"> 📚 Reading</label>
                                <label><input type="checkbox" name="hobbies" value="traveling"> ✈️ Traveling</label>
                                <label><input type="checkbox" name="hobbies" value="music"> 🎵 Music</label>
                                <label><input type="checkbox" name="hobbies" value="sports"> ⚽ Sports</label>
                                <label><input type="checkbox" name="hobbies" value="coding"> 💻 Coding</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="comments">Additional Comments</label>
                            <textarea id="comments" name="comments" 
                                      placeholder="Any special requests or questions..."></textarea>
                        </div>
                    </fieldset>

                    <div style="text-align:center;">
                        <button type="submit" class="btn">✅ Submit Booking</button>
                        <button type="reset" class="btn btn-reset">🔄 Reset</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer role="contentinfo">
        <div class="container">
            <p>&copy; 2025 Language Learning Center | Sa'ad Said Araye | C1250095</p>
        </div>
    </footer>
</body>
</html>
